<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>井字棋 - 青孤游戏</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
html, body {
  width: 100%;
  min-height: 100dvh;
}
body {
  background: #0a0a14;
  color: #dcdcdc;
  font-family: "Microsoft YaHei","PingFang SC",Arial,sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.container {
  width: min(500px, 100%);
}
.game-area {
  background: #0f0f19;
  border: 2px solid #2a2a40;
  border-radius: 6px;
  padding: clamp(16px, 4vw, 28px);
  position: relative;
}
h1 {
  text-align: center;
  font-size: clamp(22px, 5.5vw, 30px);
  color: #ffc832;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

/* Scoreboard */
.scores {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}
.score-item {
  background: #1e1e2d;
  padding: 6px 14px;
  border-radius: 6px;
  text-align: center;
  font-size: clamp(12px, 3vw, 15px);
  color: #8c8c8c;
  min-width: 70px;
}
.score-item .val {
  display: block;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: bold;
  color: #dcdcdc;
  line-height: 1.3;
}
.score-item.player .val { color: #ffc832; }
.score-item.ai .val { color: #8c8c8c; }
.score-item.draw .val { color: #6a6a8a; }

/* Status */
.status {
  text-align: center;
  font-size: clamp(16px, 4vw, 20px);
  color: #dcdcdc;
  margin-bottom: 14px;
  min-height: 1.6em;
  padding: 4px 0;
}
.status .highlight {
  color: #ffc832;
  font-weight: bold;
}

/* Grid */
.grid-container {
  position: relative;
  margin: 0 auto 16px;
  max-width: 400px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  background: #2a2a40;
  border: 2px solid #2a2a40;
  border-radius: 4px;
  overflow: hidden;
}
.cell {
  aspect-ratio: 1;
  background: #0f0f19;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: clamp(40px, 12vw, 72px);
  position: relative;
  transition: background 0.15s;
}
.cell:not(.taken):hover {
  background: #18182a;
}
.cell:not(.taken):active {
  background: #202038;
}
.cell.taken {
  cursor: default;
}
.cell.win-cell {
  background: rgba(255, 200, 50, 0.12);
}

/* Mark styling */
.cell .mark {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  animation: markPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  transform-origin: center;
}
@keyframes markPop {
  0% {
    transform: scale(0);
    opacity: 0;
  }
  70% {
    transform: scale(1.15);
    opacity: 1;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
.mark-x {
  color: #ffc832;
  font-weight: bold;
}
.mark-o {
  color: #c0c0d0;
  font-weight: bold;
}

/* SVG win line */
.win-line-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5;
}
.win-line {
  stroke: #ffc832;
  stroke-width: 4;
  stroke-linecap: round;
  fill: none;
  stroke-dasharray: 800;
  stroke-dashoffset: 800;
  animation: drawLine 0.45s ease forwards;
  filter: drop-shadow(0 0 6px rgba(255,200,50,0.5));
}
@keyframes drawLine {
  to {
    stroke-dashoffset: 0;
  }
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: clamp(10px, 2.5vw, 14px);
  font-size: clamp(14px, 3.5vw, 18px);
  font-family: inherit;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s, opacity 0.2s;
  letter-spacing: 1px;
}
.btn-green {
  background: #3cb43c;
  color: #fff;
}
.btn-green:hover {
  background: #45c845;
}
.btn-green:active {
  background: #2a8a2a;
}
.btn-gray {
  background: #1e1e32;
  color: #aab;
}
.btn-gray:hover {
  background: #3c3c64;
}
.btn-gray:active {
  background: #2c2c50;
}
.btn-red {
  background: #c83c3c;
  color: #fff;
}
.btn-red:hover {
  background: #d84545;
}
.btn-red:active {
  background: #a82a2a;
}
.btn:disabled {
  cursor: default;
  opacity: 0.5;
}

/* Turns indicator */
.turns {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 14px;
  font-size: clamp(13px, 3.2vw, 16px);
  color: #8c8c8c;
}
.turns .turn-item {
  padding: 4px 14px;
  border-radius: 4px;
  border: 1px solid transparent;
  transition: all 0.25s;
}
.turns .turn-item.active {
  border-color: #3a3a55;
  background: #18182a;
  color: #dcdcdc;
}

/* Mobile */
@media (max-width: 360px) {
  .game-area {
    padding: 12px 10px;
  }
  .scores {
    gap: 4px;
  }
  .score-item {
    min-width: 54px;
    padding: 4px 8px;
  }
}
</style>
</head>
<body>
<div class="container">
<div class="game-area">
  <h1>⭕ 井字棋</h1>

  <!-- Scores -->
  <div class="scores">
    <div class="score-item player">
      <span class="val" id="playerScore">0</span>
      你 ❌
    </div>
    <div class="score-item draw">
      <span class="val" id="drawScore">0</span>
      平局
    </div>
    <div class="score-item ai">
      <span class="val" id="aiScore">0</span>
      AI ⭕
    </div>
  </div>

  <!-- Turn indicator -->
  <div class="turns" id="turnsIndicator">
    <span class="turn-item active" id="turnPlayer">🧑 你的回合</span>
    <span class="turn-item" id="turnAI">🤖 AI 思考中</span>
  </div>

  <!-- Status -->
  <div class="status" id="status">点击格子开始对局</div>

  <!-- Grid -->
  <div class="grid-container">
    <div class="grid" id="grid">
      <!-- 9 cells generated by JS -->
    </div>
    <svg class="win-line-svg" id="winLineSvg">
      <line class="win-line" id="winLine" x1="0" y1="0" x2="0" y2="0"/>
    </svg>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-green" id="restartBtn">重新开始</button>
    <button class="btn btn-red" id="resetScoreBtn">重置分数</button>
  </div>
</div>
</div>
<script>
(function(){
  /* ---- constants ---- */
  const LINES = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  /* ---- state ---- */
  let board = Array(9).fill(null);       // null | 'X' | 'O'
  let gameActive = false;
  let isPlayerTurn = true;              // player goes first
  const playerMark = 'X';
  const aiMark = 'O';
  let scores = { player: 0, ai: 0, draw: 0 };
  let gameOverFlag = false;             // prevents further moves
  let aiTimeout = null;

  /* ---- DOM refs ---- */
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');
  const playerScoreEl = document.getElementById('playerScore');
  const aiScoreEl = document.getElementById('aiScore');
  const drawScoreEl = document.getElementById('drawScore');
  const restartBtn = document.getElementById('restartBtn');
  const resetScoreBtn = document.getElementById('resetScoreBtn');
  const winLineSvg = document.getElementById('winLineSvg');
  const winLine = document.getElementById('winLine');
  const turnPlayer = document.getElementById('turnPlayer');
  const turnAI = document.getElementById('turnAI');

  /* ---- create cells ---- */
  const cells = [];
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;

    const markSpan = document.createElement('span');
    markSpan.className = 'mark';
    cell.appendChild(markSpan);

    grid.appendChild(cell);
    cells.push(cell);

    cell.addEventListener('click', () => handleCellClick(i));
  }

  /* ---- win detection ---- */
  function checkWinner(boardArr) {
    for (const [a,b,c] of LINES) {
      if (boardArr[a] && boardArr[a] === boardArr[b] && boardArr[a] === boardArr[c]) {
        return { winner: boardArr[a], line: [a,b,c] };
      }
    }
    return null;
  }

  function isFull(boardArr) {
    return boardArr.every(v => v !== null);
  }

  /* ---- UI update ---- */
  function updateTurnIndicator() {
    if (!gameActive || gameOverFlag) {
      turnPlayer.classList.remove('active');
      turnAI.classList.remove('active');
      return;
    }
    turnPlayer.classList.toggle('active', isPlayerTurn);
    turnAI.classList.toggle('active', !isPlayerTurn);
  }

  function renderBoard() {
    for (let i = 0; i < 9; i++) {
      const cell = cells[i];
      const mark = cell.querySelector('.mark');
      if (board[i] === 'X') {
        mark.textContent = '✕';
        mark.className = 'mark mark-x';
        cell.classList.add('taken');
      } else if (board[i] === 'O') {
        mark.textContent = '◯';
        mark.className = 'mark mark-o';
        cell.classList.add('taken');
      } else {
        mark.textContent = '';
        mark.className = 'mark';
        cell.classList.remove('taken');
      }
    }
  }

  function updateScores() {
    playerScoreEl.textContent = scores.player;
    aiScoreEl.textContent = scores.ai;
    drawScoreEl.textContent = scores.draw;
  }

  function clearWinLine() {
    winLine.style.strokeDasharray = '0';
    winLine.style.strokeDashoffset = '0';
    winLine.setAttribute('x1', '0');
    winLine.setAttribute('y1', '0');
    winLine.setAttribute('x2', '0');
    winLine.setAttribute('y2', '0');
  }

  function removeWinHighlights() {
    cells.forEach(c => c.classList.remove('win-cell'));
  }

  /* ---- win line animation ---- */
  function showWinLine(winningCells) {
    const gridEl = document.querySelector('.grid');
    const gRect = gridEl.getBoundingClientRect();

    // Calculate center of first and last cell
    const c0 = cells[winningCells[0]];
    const c2 = cells[winningCells[2]];
    const r0 = c0.getBoundingClientRect();
    const r2 = c2.getBoundingClientRect();

    // Convert to SVG coordinates (percentage of grid container)
    const svg = winLineSvg;
    const svgRect = svg.getBoundingClientRect();

    const x1 = ((r0.left + r0.width / 2) - svgRect.left) / svgRect.width * 100;
    const y1 = ((r0.top + r0.height / 2) - svgRect.top) / svgRect.height * 100;
    const x2 = ((r2.left + r2.width / 2) - svgRect.left) / svgRect.width * 100;
    const y2 = ((r2.top + r2.height / 2) - svgRect.top) / svgRect.height * 100;

    // Set line coordinates as percentages
    winLine.setAttribute('x1', x1 + '%');
    winLine.setAttribute('y1', y1 + '%');
    winLine.setAttribute('x2', x2 + '%');
    winLine.setAttribute('y2', y2 + '%');

    // Calculate length
    const dx = (x2 - x1) / 100 * svgRect.width;
    const dy = (y2 - y1) / 100 * svgRect.height;
    const length = Math.sqrt(dx * dx + dy * dy);

    // Reset and animate
    winLine.style.strokeDasharray = length + 'px';
    winLine.style.strokeDashoffset = length + 'px';

    requestAnimationFrame(() => {
      winLine.style.transition = 'stroke-dashoffset 0.45s ease';
      winLine.style.strokeDashoffset = '0px';
    });

    // Highlight winning cells
    winningCells.forEach(idx => cells[idx].classList.add('win-cell'));
  }

  /* ---- game flow ---- */
  function handleCellClick(idx) {
    if (!gameActive || gameOverFlag) return;
    if (!isPlayerTurn) return;
    if (board[idx] !== null) return;

    makeMove(idx, playerMark);
  }

  function makeMove(idx, mark) {
    board[idx] = mark;
    renderBoard();

    // Check result
    const result = checkWinner(board);
    if (result) {
      endGame(result.winner, result.line);
      return;
    }

    if (isFull(board)) {
      endGame('draw');
      return;
    }

    // Switch turn
    isPlayerTurn = (mark === aiMark);
    updateTurnIndicator();

    if (!isPlayerTurn && gameActive && !gameOverFlag) {
      scheduleAIMove();
    }
  }

  function scheduleAIMove() {
    if (aiTimeout) clearTimeout(aiTimeout);
    aiTimeout = setTimeout(() => {
      aiTimeout = null;
      if (gameActive && !gameOverFlag && !isPlayerTurn) {
        const idx = getAIMove();
        if (idx !== -1) {
          makeMove(idx, aiMark);
        }
      }
    }, 400); // Small delay for natural feel
  }

  function endGame(winner, line) {
    gameOverFlag = true;
    if (aiTimeout) {
      clearTimeout(aiTimeout);
      aiTimeout = null;
    }

    if (winner === playerMark) {
      scores.player++;
      status.innerHTML = '🎉 你赢了！';
      if (line) showWinLine(line);
    } else if (winner === aiMark) {
      scores.ai++;
      status.innerHTML = '😔 AI 赢了！';
      if (line) showWinLine(line);
    } else {
      scores.draw++;
      status.innerHTML = '🤝 平局！';
    }

    updateScores();
    updateTurnIndicator();
  }

  /* ---- AI logic ---- */
  function getAIMove() {
    // 1. Win if possible
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) {
        board[i] = aiMark;
        if (checkWinner(board)) { board[i] = null; return i; }
        board[i] = null;
      }
    }

    // 2. Block player's win
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) {
        board[i] = playerMark;
        if (checkWinner(board)) { board[i] = null; return i; }
        board[i] = null;
      }
    }

    // 3. Take center
    if (board[4] === null) return 4;

    // 4. Take a corner
    const corners = [0, 2, 6, 8];
    const availCorners = corners.filter(i => board[i] === null);
    if (availCorners.length > 0) {
      return availCorners[Math.floor(Math.random() * availCorners.length)];
    }

    // 5. Take any
    const avail = [];
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) avail.push(i);
    }
    return avail.length > 0 ? avail[Math.floor(Math.random() * avail.length)] : -1;
  }

  /* ---- reset ---- */
  function resetBoard() {
    if (aiTimeout) {
      clearTimeout(aiTimeout);
      aiTimeout = null;
    }

    board = Array(9).fill(null);
    gameActive = true;
    isPlayerTurn = true;
    gameOverFlag = false;

    renderBoard();
    clearWinLine();
    removeWinHighlights();
    updateTurnIndicator();
    status.innerHTML = '你的回合，点击格子落子 ❌';
  }

  function resetScores() {
    scores = { player: 0, ai: 0, draw: 0 };
    updateScores();
    resetBoard();
  }

  /* ---- events ---- */
  restartBtn.addEventListener('click', resetBoard);
  resetScoreBtn.addEventListener('click', resetScores);

  /* ---- init ---- */
  resetBoard();
})();
</script>
</body>
</html>
