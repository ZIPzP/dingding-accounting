<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>打砖块 - 青孤工具包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a14;
  color:#dcdcdc;
  font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden
}
.container{
  max-width:500px;
  width:100%;
  padding:clamp(10px,3vw,20px);
  margin:0 auto
}
.title{
  text-align:center;
  font-size:clamp(20px,5vw,28px);
  font-weight:bold;
  margin-bottom:clamp(6px,1.5vw,12px);
  color:#ffc832
}
.info-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f0f19;
  border:2px solid #2a2a40;
  border-radius:6px;
  padding:clamp(6px,1.5vw,10px) clamp(10px,2.5vw,16px);
  margin-bottom:10px;
  font-size:clamp(13px,3.2vw,18px)
}
.info-item{
  display:flex;
  align-items:center;
  gap:4px
}
.score-val{color:#ffc832}
.lives-val{color:#ff5252}
.level-val{color:#8c8c8c}
.canvas-wrap{
  border:2px solid #2a2a40;
  border-radius:6px;
  padding:2px;
  background:#1e1e2d;
  margin-bottom:12px;
  overflow:hidden;
  line-height:0
}
#gameCanvas{
  display:block;
  width:100%;
  height:auto;
  aspect-ratio:480/640;
  background:#0f0f19;
  touch-action:none
}
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap
}
.btn{
  background:#1e1e32;
  color:#aab;
  border:2px solid #2a2a40;
  border-radius:6px;
  padding:clamp(6px,1.5vw,10px) clamp(16px,4vw,28px);
  font-size:clamp(13px,3.2vw,17px);
  font-family:inherit;
  cursor:pointer;
  transition:background .15s;
  touch-action:manipulation
}
.btn:hover{background:#3c3c64}
.btn-green{background:#3cb43c;color:#fff;border-color:#3cb43c}
.btn-green:hover{background:#4cc84c}
.help-text{
  text-align:center;
  color:#8c8c8c;
  font-size:clamp(11px,2.8vw,14px);
  margin-top:10px;
  line-height:1.6
}
@media(pointer:coarse){
  .help-text{font-size:clamp(10px,2.5vw,13px)}
}
</style>
</head>
<body>

<div class="container">
  <div class="title">🏓 打砖块</div>

  <div class="info-bar">
    <div class="info-item">得分: <span class="score-val" id="scoreDisplay">0</span></div>
    <div class="info-item lives-val" id="livesDisplay">❤️❤️❤️</div>
    <div class="info-item">关卡: <span class="level-val" id="levelDisplay">1</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="480" height="640"></canvas>
  </div>

  <div class="controls">
    <button class="btn" id="restartBtn">重新开始</button>
  </div>

  <div class="help-text">
    鼠标/手指移动控制挡板 &nbsp;|&nbsp; ← → 键盘方向键
  </div>
</div>

<script>
(function(){
'use strict';

// === Canvas Setup ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreDisplay');
const livesEl = document.getElementById('livesDisplay');
const levelEl = document.getElementById('levelDisplay');

const CW = 480, CH = 640;
canvas.width = CW;
canvas.height = CH;

// === Constants ===
const PADDLE_W = 80, PADDLE_H = 12, PADDLE_Y = CH - 40;
const BALL_R = 6;
const BRICK_ROWS = 8, BRICK_COLS = 8;
const BRICK_H = 18, BRICK_PAD = 4, BRICK_TOP = 44;
const BRICK_LEFT = 10;
const BRICK_W = (CW - BRICK_LEFT * 2 - BRICK_PAD * (BRICK_COLS - 1)) / BRICK_COLS;

const BRICK_COLORS = [
  '#e74c3c',  // red
  '#e67e22',  // orange
  '#f1c40f',  // yellow
  '#2ecc71',  // green
  '#1abc9c',  // cyan
  '#3498db',  // blue
  '#9b59b6',  // purple
  '#e91e90'   // pink
];

// === State ===
let score = 0;
let lives = 3;
let level = 1;
let launched = false;
let gameOver = false;
let levelTransition = false;
let transitionTimer = null;
let brickClearCount = 0;
let speedMult = 1.0;

let paddle = { x: (CW - PADDLE_W) / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
let ball  = { x: CW / 2, y: PADDLE_Y - BALL_R, r: BALL_R, dx: 0, dy: 0 };
let bricks = [];

// === Helpers ===
function getBaseSpeed() {
  return 4 + (level - 1) * 0.5;
}

function getCurrentSpeed() {
  return getBaseSpeed() * speedMult;
}

// === Bricks ===
function createBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        alive: true,
        color: BRICK_COLORS[r % BRICK_COLORS.length]
      });
    }
  }
}

// === Ball ===
function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r;
  ball.dx = 0;
  ball.dy = 0;
  launched = false;
}

function launchBall() {
  if (launched || gameOver || levelTransition) return;
  launched = true;
  const speed = getCurrentSpeed();
  // Launch mostly upward with slight random horizontal bias
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  ball.dx = speed * Math.sin(angle);
  ball.dy = speed * Math.cos(angle);
}

// === Update ===
function update() {
  if (gameOver || levelTransition) return;

  // Ball follows paddle when not launched
  if (!launched) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r;
    return;
  }

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounces
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if (ball.x + ball.r > CW) { ball.x = CW - ball.r; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Fall off bottom = lose life
  if (ball.y + ball.r > CH) {
    lives--;
    updateUI();
    if (lives <= 0) {
      gameOver = true;
    } else {
      resetBall();
    }
    return;
  }

  // Paddle collision
  if (ball.dy > 0 &&
      ball.y + ball.r >= paddle.y &&
      ball.y - ball.r <= paddle.y + paddle.h &&
      ball.x + ball.r >= paddle.x &&
      ball.x - ball.r <= paddle.x + paddle.w) {

    const hitPos = Math.max(0, Math.min(1, (ball.x - paddle.x) / paddle.w));
    // Map hit position to angle: -60deg (left edge) to +60deg (right edge)
    const angle = (hitPos - 0.5) * Math.PI * 2 / 3;
    const speed = getCurrentSpeed();
    ball.dx = speed * Math.sin(angle);
    ball.dy = -speed * Math.cos(angle);

    // Ensure minimum horizontal speed to prevent boring straight-up bounces
    const minDx = speed * 0.12;
    if (Math.abs(ball.dx) < minDx) {
      ball.dx = ball.dx >= 0 ? minDx : -minDx;
    }

    ball.y = paddle.y - ball.r;
  }

  // Brick collisions
  for (let i = 0; i < bricks.length; i++) {
    const brick = bricks[i];
    if (!brick.alive) continue;

    // AABB overlap test
    if (ball.x + ball.r > brick.x &&
        ball.x - ball.r < brick.x + brick.w &&
        ball.y + ball.r > brick.y &&
        ball.y - ball.r < brick.y + brick.h) {

      brick.alive = false;
      score += 10;

      // Track bricks cleared for speed increase
      brickClearCount++;
      if (brickClearCount % 8 === 0) {
        speedMult *= 1.03;
        // Speed up the ball immediately (every 8 bricks cleared)
        ball.dx *= 1.03;
        ball.dy *= 1.03;
      }

      // Determine collision side and push ball out
      const overlapL = (ball.x + ball.r) - brick.x;
      const overlapR = (brick.x + brick.w) - (ball.x - ball.r);
      const overlapT = (ball.y + ball.r) - brick.y;
      const overlapB = (brick.y + brick.h) - (ball.y - ball.r);
      const minX = Math.min(overlapL, overlapR);
      const minY = Math.min(overlapT, overlapB);

      if (minX < minY) {
        ball.dx = -ball.dx;
        ball.x = overlapL < overlapR
          ? brick.x - ball.r
          : brick.x + brick.w + ball.r;
      } else {
        ball.dy = -ball.dy;
        ball.y = overlapT < overlapB
          ? brick.y - ball.r
          : brick.y + brick.h + ball.r;
      }

      updateUI();
      break; // one brick per frame
    }
  }

  // Level complete check
  if (bricks.every(b => !b.alive)) {
    levelTransition = true;
  }
}

// === Draw ===
function draw() {
  // Clear
  ctx.clearRect(0, 0, CW, CH);

  // Background
  ctx.fillStyle = '#0f0f19';
  ctx.fillRect(0, 0, CW, CH);

  // --- Bricks ---
  for (const brick of bricks) {
    if (!brick.alive) continue;
    ctx.fillStyle = brick.color;
    ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
    // Subtle highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(brick.x, brick.y, brick.w, 2);
    // Subtle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(brick.x, brick.y + brick.h - 2, brick.w, 2);
  }

  // --- Paddle ---
  ctx.fillStyle = '#ffc832';
  ctx.shadowColor = 'rgba(255,200,50,0.25)';
  ctx.shadowBlur = 8;
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.shadowBlur = 0;

  // --- Ball ---
  ctx.fillStyle = '#dcdcdc';
  ctx.shadowColor = 'rgba(220,220,220,0.35)';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // --- Launch instruction ---
  if (!launched && !gameOver) {
    ctx.fillStyle = '#8c8c8c';
    ctx.font = '16px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('点击或按空格开始', CW / 2, paddle.y - 30);
  }

  // --- Game over overlay ---
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#ff5252';
    ctx.font = 'bold 36px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💥 游戏结束', CW / 2, CH / 2 - 30);
    ctx.fillStyle = '#dcdcdc';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.fillText('最终得分: ' + score, CW / 2, CH / 2 + 28);
    ctx.fillStyle = '#8c8c8c';
    ctx.font = '16px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.fillText('点击重新开始', CW / 2, CH / 2 + 72);
  }

  // --- Level transition overlay ---
  if (levelTransition) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#ffc832';
    ctx.font = 'bold 36px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎉 第 ' + level + ' 关完成!', CW / 2, CH / 2 - 20);
    ctx.fillStyle = '#dcdcdc';
    ctx.font = '20px "Microsoft YaHei","PingFang SC",Arial,sans-serif';
    ctx.fillText('准备进入下一关...', CW / 2, CH / 2 + 40);
  }
}

// === UI Update ===
function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
}

// === Level Management ===
function nextLevel() {
  level++;
  brickClearCount = 0;
  speedMult = 1.0;
  levelTransition = false;
  createBricks();
  resetBall();
  updateUI();
}

// === Reset (full game) ===
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  brickClearCount = 0;
  speedMult = 1.0;
  gameOver = false;
  levelTransition = false;
  if (transitionTimer) {
    clearTimeout(transitionTimer);
    transitionTimer = null;
  }
  paddle.x = (CW - PADDLE_W) / 2;
  createBricks();
  resetBall();
  updateUI();
}

// === Game Loop ===
function gameLoop() {
  update();
  draw();

  // Handle level transition with delay
  if (levelTransition && !transitionTimer) {
    transitionTimer = setTimeout(function() {
      transitionTimer = null;
      nextLevel();
    }, 1500);
  }

  requestAnimationFrame(gameLoop);
}

// === Event Handlers ===
// Mouse
canvas.addEventListener('mousemove', function(e) {
  if (gameOver || levelTransition) return;
  var rect = canvas.getBoundingClientRect();
  var x = (e.clientX - rect.left) * (CW / rect.width);
  paddle.x = Math.max(0, Math.min(CW - paddle.w, x - paddle.w / 2));
});

canvas.addEventListener('click', function(e) {
  if (gameOver) { resetGame(); return; }
  launchBall();
});

// Touch
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (gameOver) { resetGame(); return; }
  var rect = canvas.getBoundingClientRect();
  var t = e.touches[0];
  var x = (t.clientX - rect.left) * (CW / rect.width);
  paddle.x = Math.max(0, Math.min(CW - paddle.w, x - paddle.w / 2));
  if (!launched) launchBall();
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (gameOver || levelTransition) return;
  var rect = canvas.getBoundingClientRect();
  var t = e.touches[0];
  var x = (t.clientX - rect.left) * (CW / rect.width);
  paddle.x = Math.max(0, Math.min(CW - paddle.w, x - paddle.w / 2));
}, { passive: false });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') {
    paddle.x = Math.max(0, paddle.x - 20);
    e.preventDefault();
  } else if (e.key === 'ArrowRight') {
    paddle.x = Math.min(CW - paddle.w, paddle.x + 20);
    e.preventDefault();
  } else if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    if (gameOver) { resetGame(); return; }
    launchBall();
  }
});

// Restart button
document.getElementById('restartBtn').addEventListener('click', resetGame);

// === Init ===
createBricks();
resetBall();
updateUI();
gameLoop();

})();
</script>
</body>
</html>
